<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Database - JPatchwork</title>
<meta name="description" content="Browse and filter 30+ Japanese patchwork and quilting products. Compare fabrics, tools, books, and notions from top Japanese craft brands.">
<meta property="og:title" content="JPatchwork - Product Database">
<meta property="og:description" content="Browse and filter 30+ Japanese patchwork products by category, brand, type, and price.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://humancronadmin.github.io/j-patchwork/database.html">
<link rel="canonical" href="https://humancronadmin.github.io/j-patchwork/database.html">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-brand">J<span>Patchwork</span></a>
  <div class="nav-links">
    <a href="database.html" class="active">Database</a>
    <a href="index.html#about">About</a>
  </div>
</nav>
<div class="db-header">
  <h1>Product Database</h1>
  <p>Japanese patchwork traditions for modern quilters.</p>
</div>
<div class="filters">
  <input type="search" id="search" placeholder="Search name or brand...">
  <select id="category"><option value="">All Categories</option></select>
  <select id="brand"><option value="">All Brands</option></select>
  <select id="type"><option value="">All Types</option></select>
  <select id="sort">
    <option value="">Sort by...</option>
    <option value="price-asc">Price: Low to High</option>
    <option value="price-desc">Price: High to Low</option>
    <option value="name-asc">Name: A to Z</option>
  </select>
</div>
<div class="result-count" id="resultCount"></div>
<div class="product-grid" id="grid"></div>
<footer class="footer">
  <p>JPatchwork is an open-source project. <a href="https://github.com/humancronadmin">GitHub</a></p>
</footer>
<script src="js/database.js"></script>
</body>
</html>
